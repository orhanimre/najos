─────────────────────────────────────────────────── -->
<title>Apart Hotel Najos | Apartamentos en San Carlos, Antioquia</title>
<meta name="description" content="Alójate en el corazón de San Carlos, Antioquia. Apartamentos completamente equipados a pasos del parque principal, charcos, cascadas y tours de aventura.">
<meta name="keywords" content="apartamentos San Carlos Antioquia, alojamiento San Carlos, apart hotel San Carlos, hospedaje San Carlos Antioquia, cabañas San Carlos, turismo San Carlos">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://aptonajos.com/">

<!-- Open Graph (WhatsApp / Facebook previews) -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://aptonajos.com/">
<meta property="og:title" content="Apart Hotel Najos | Apartamentos en San Carlos, Antioquia">
<meta property="og:description" content="Tu refugio en el corazón de San Carlos. Apartamentos con todo incluido, a pasos del parque principal y los mejores charcos.">
<meta property="og:image" content="https://aptonajos.com/og-image.jpg">
<meta property="og:locale" content="es_CO">
<meta property="og:site_name" content="Apart Hotel Najos">

<!-- Structured Data: Local Business (helps Google show address, stars, etc.) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LodgingBusiness",
  "name": "Apart Hotel Najos",
  "url": "https://aptonajos.com",
  "description": "Apartamentos completamente equipados en el centro de San Carlos, Antioquia. Ideal para turistas que desean explorar charcos, cascadas y la naturaleza del oriente antioqueño.",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "San Carlos",
    "addressRegion": "Antioquia",
    "addressCountry": "CO"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 6.1888,
    "longitude": -74.9920
  },
  "telephone": "",
  "priceRange": "$$",
  "image": "https://aptonajos.com/og-image.jpg",
  "amenityFeature": [
    { "@type": "LocationFeatureSpecification", "name": "Cocina equipada", "value": true },
    { "@type": "LocationFeatureSpecification", "name": "WiFi", "value": true },
    { "@type": "LocationFeatureSpecification", "name": "Aire acondicionado", "value": true }
  ]
}
</script>
