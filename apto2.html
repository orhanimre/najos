<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najos-2 - Apart Hotel Najos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ocean: #0077BE; --ocean-dark: #005A8D; --white: #FFFFFF;
            --sand: #F4E8D8; --shadow: rgba(0, 77, 115, 0.15);
        }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-light) 100%); }
        .container { max-width: 1200px; margin: 0 auto; background: var(--white); min-height: 100vh; }
        .header { 
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); 
            color: var(--white); 
            padding: 20px 40px; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 16px rgba(220, 38, 38, 0.3);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-left {
            flex-shrink: 0;
        }

        .header-right {
            flex-shrink: 0;
        }

        .header-center {
            flex: 1;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            max-width: 120px;
            margin-bottom: 0;
            display: block;
        }

        .header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -1px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .header-subtitle {
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 300;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        .content { 
            padding: 120px 40px 60px 40px; 
            max-width: 900px; 
            margin: 0 auto; 
        }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
        .section { background: #f8f9fa; padding: 40px; border-radius: 16px; margin-bottom: 40px; }
        .section h2 { color: var(--ocean-dark); margin-bottom: 20px; }
        .map-container { margin: 20px 0; }
        .map-btn { background: var(--ocean); color: white; padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .contact { display: flex; gap: 16px; justify-content: center; margin-top: 20px; }
        .contact a { padding: 12px 20px; border-radius: 12px; text-decoration: none; color: white; font-weight: 600; }
        .phone { background: #48bb78; }
        .whatsapp { background: #25d366; }
        .instagram { background: #e4405f; }
        .back-link { display: inline-block; margin-top: 20px; color: var(--ocean); text-decoration: none; padding: 12px 24px; border: 2px solid var(--ocean); border-radius: 12px; }

        /* Navigation Menu */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 15px 24px;
            }

            .header-content {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .header-left {
                align-self: center;
            }

            .header-center {
                text-align: center;
                padding: 0;
            }

            .header-right {
                align-self: center;
            }

            .logo {
                max-width: 100px;
            }

            .content {
                padding: 140px 24px 40px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <img src="https://i.imgur.com/L8KoquC.jpg" alt="Logo" class="logo">
                </div>
                <div class="header-center">
                    <h1>Najos-2</h1>
                    <p class="header-subtitle">Apartamento completo en San Carlos</p>
                </div>
                <div class="header-right">
                    <nav class="nav-menu">
                        <a href="index.html" class="nav-link">← Volver</a>
                    </nav>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="gallery">
                <img src="https://imgur.com/dVlUrNm.jpg" alt="Najos-2">
                <img src="https://imgur.com/image1.jpg" alt="Interior">
                <img src="https://imgur.com/image2.jpg" alt="Cocina">
                <img src="https://imgur.com/image3.jpg" alt="Baño">
                <img src="https://imgur.com/image4.jpg" alt="Terraza">
                <img src="https://imgur.com/image5.jpg" alt="Vista">
            </div>
            
            <div class="section">
                <h2>📍 Ubicación</h2>
                <p>Calle Principal #123, San Carlos, Antioquia</p>
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m10!1e1!1m0!1m2!1d18.4673896!2d-74.8088896!3f1!2m0!1b0!1m18!2f-74.8088896!4v0.6" width="100%" height="300" style="border:0;" allowfullscreen></iframe>
                </div>
                <button class="map-btn" onclick="window.open('https://maps.google.com/?q=San+Carlos+Antioquia', '_blank')">Abrirlo en Google Maps</button>
            </div>
            
            <div class="section">
                <h2>📞 Comuníquese con Nosotros</h2>
                <div class="contact">
                    <a href="tel:+57XXXXXXXXXX" class="phone">📞 Llamar</a>
                    <a href="https://wa.me/57XXXXXXXXXX" class="whatsapp">💬 WhatsApp</a>
                    <a href="https://instagram.com/apartnajos" class="instagram">📷 Instagram</a>
                </div>
            </div>
            
            <a href="index.html" class="back-link">← Volver</a>
        </div>
    </div>
</body>
</html>
