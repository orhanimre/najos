<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najos-4 - Apart Hotel Najos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ocean: #0077BE; --ocean-dark: #005A8D; --white: #FFFFFF;
            --sand: #F4E8D8; --shadow: rgba(0, 77, 115, 0.15);
        }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-light) 100%); }
        .container { max-width: 1200px; margin: 0 auto; background: var(--white); min-height: 100vh; }
        .header { 
            background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-dark) 100%); 
            color: var(--white); 
            padding: 12px 40px; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 16px rgba(0, 119, 190, 0.3);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 60px;
        }

        .header-left {
            flex-shrink: 0;
        }

        .header-left a {
            display: block;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .header-left a:hover {
            transform: scale(1.05);
        }

        .header-right {
            flex-shrink: 0;
        }

        .header-center {
            flex: 1;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            max-width: 120px;
            margin-bottom: 0;
            display: block;
            border-radius: 16px;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
        }

        .header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -1px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .header-title {
            text-align: center;
            padding: 6px 0 0;
        }

        .header-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 900;
            margin-bottom: 4px;
            letter-spacing: -1px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        .header-subtitle {
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 300;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        .content { 
            padding: 170px 40px 60px 40px; 
            max-width: 900px; 
            margin: 0 auto; 
        }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .gallery img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 12px; 
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--white);
            border: none;
            font-size: 32px;
            color: #6B7280;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 2001;
        }

        .modal-close:hover {
            background: #f1f5f9;
            color: var(--ocean);
            transform: scale(1.1);
        }
        .section { background: #f8f9fa; padding: 40px; border-radius: 16px; margin-bottom: 40px; }
        .section h2 { color: var(--ocean-dark); margin-bottom: 20px; }
        .map-container { margin: 20px 0; }
        .map-btn { background: var(--ocean); color: white; padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .contact { display: flex; gap: 16px; justify-content: center; margin-top: 20px; }
        .contact a { padding: 12px 20px; border-radius: 12px; text-decoration: none; color: white; font-weight: 600; }
        .phone { background: #48bb78; }
        .whatsapp { background: #25d366; }
        .instagram { background: #e4405f; }
        .back-link { display: inline-block; margin-top: 20px; color: var(--ocean); text-decoration: none; padding: 12px 24px; border: 2px solid var(--ocean); border-radius: 12px; }

        /* Navigation Menu */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 24px;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,255,255,0.1);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header {
                padding: 8px 20px;
            }

            .header-content {
                align-items: center;
                gap: 8px;
            }

            .header-left {
                flex-shrink: 0;
            }

            .header-left a {
                display: block;
                text-decoration: none;
                transition: transform 0.3s ease;
            }

            .header-left a:hover {
                transform: scale(1.05);
            }

            .header-right {
                flex-shrink: 0;
            }

            .header-title {
                font-family: 'Playfair Display', serif;
                font-size: clamp(20px, 4vw, 28px);
                font-weight: 900;
                margin-bottom: 4px;
                letter-spacing: -1px;
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
                text-align: center;
            }

            .header-subtitle {
                font-size: clamp(10px, 2vw, 14px);
                font-weight: 300;
                opacity: 0.95;
                letter-spacing: 0.5px;
                text-align: center;
            }

            .logo {
                max-width: 70px;
            }

            .nav-menu {
                flex-direction: row;
                gap: 6px;
                margin-bottom: 0;
            }

            .nav-link {
                font-size: 11px;
                padding: 3px 6px;
            }

            .content {
                padding: 190px 24px 40px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" id="siteHeader">
            <div class="header-content">
                <div class="header-left">
                    <a href="index.html">
                        <img src="https://i.imgur.com/L8KoquC.jpg" alt="Logo Apart Hotel Najos" class="logo">
                    </a>
                </div>
                <div class="header-right">
                    <nav class="nav-menu">
                        <a href="sobre-nosotros.html" class="nav-link">Sobre Nosotros</a>
                        <a href="san-carlos.html" class="nav-link">San Carlos</a>
                    </nav>
                </div>
            </div>
            <div class="header-title">
                <h1>Najos-4</h1>
                <p class="header-subtitle">Apartamento completo en San Carlos</p>
            </div>
        </div>
        
        <div class="content" id="mainContent">
            <div class="gallery">
                <img src="https://imgur.com/QLnvbcu.jpg" alt="Najos-4" onclick="openModal(this.src)">
                <img src="https://imgur.com/image11.jpg" alt="Interior" onclick="openModal(this.src)">
                <img src="https://imgur.com/image12.jpg" alt="Cocina" onclick="openModal(this.src)">
                <img src="https://imgur.com/image13.jpg" alt="Baño" onclick="openModal(this.src)">
                <img src="https://imgur.com/image14.jpg" alt="Terraza" onclick="openModal(this.src)">
                <img src="https://imgur.com/image15.jpg" alt="Vista" onclick="openModal(this.src)">
            </div>
            
            <div class="section">
                <h2>📍 Ubicación</h2>
                <p>Calle Principal #123, San Carlos, Antioquia</p>
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m10!1e1!1m0!1m2!1d18.4673896!2d-74.8088896!3f1!2m0!1b0!1m18!2f-74.8088896!4v0.6" width="100%" height="300" style="border:0;" allowfullscreen></iframe>
                </div>
                <button class="map-btn" onclick="window.open('https://maps.google.com/?q=San+Carlos+Antioquia', '_blank')">Abrirlo en Google Maps</button>
            </div>
            
            <div class="section">
                <h2>📞 Comuníquese con Nosotros</h2>
                <div class="contact">
                    <a href="tel:+57XXXXXXXXXX" class="phone">📞 Llamar</a>
                    <a href="https://wa.me/57XXXXXXXXXX" class="whatsapp">💬 WhatsApp</a>
                    <a href="https://instagram.com/apartnajos" class="instagram">📷 Instagram</a>
                </div>
            </div>
            
            <a href="index.html" class="back-link">← Volver</a>
        </div>

        <!-- Photo Modal -->
        <div id="photoModal" class="modal">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">×</button>
                <img id="modalImage" src="" alt="Apartment photo">
            </div>
        </div>
    </div>

    <script>
        // Dynamically measure actual header height and apply it as padding-top
        function adjustContentPadding() {
            const header = document.getElementById('siteHeader');
            const content = document.getElementById('mainContent');
            if (header && content) {
                const headerHeight = header.getBoundingClientRect().height;
                content.style.paddingTop = (headerHeight + 32) + 'px';
            }
        }

        // Run on load and on resize (handles orientation changes too)
        window.addEventListener('load', adjustContentPadding);
        window.addEventListener('resize', adjustContentPadding);

        function openModal(imageSrc) {
            const modal = document.getElementById('photoModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageSrc;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('photoModal');
            modal.classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on background click
        document.getElementById('photoModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });
    </script>
</body>
</html>
