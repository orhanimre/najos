<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Cabaña 1 - Cabañas MariaMar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        .logo {
            width: 100%;
            max-width: 300px;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
        }

        @media (max-width: 600px) {
            .logo {
                max-width: 200px;
                margin-bottom: 15px;
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 30px 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .cabin-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: 600;
        }

        .banner-image {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            display: block;
        }

        .form-content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .required {
            color: #e53e3e;
        }

        input[type="text"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin: 32px 0 20px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }

        .companion-group {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
        }

        .companion-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: start;
            gap: 12px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-top: 2px;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 32px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .success-message {
            background: #48bb78;
            color: white;
        }

        .error-message {
            background: #f56565;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- Logo inside header, centered, no border --->
            <img src="https://i.imgur.com/tWfkFP8.jpg" alt="Logo Cabañas MariaMar" class="logo">
            
            <h1>Registro de Huéspedes</h1>
            <p>Cabañas MariaMar</p>
            <div class="cabin-badge">Cabaña MariaMar-1</div>
        </div>

        <!-- Panoramic banner image --->
        <img src="https://imgur.com/ifou9Lq.jpg" alt="Cabaña MariaMar-1" class="banner-image">

        <div class="form-content">
            <div id="successMessage" class="message success-message"></div>
            <div id="errorMessage" class="message error-message"></div>

            <form id="registrationForm">
                <div class="form-group">
                    <label for="nombre">Nombre(s) <span class="required">*</span></label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido(s) <span class="required">*</span></label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>

                <div class="form-group">
                    <label for="celular">Celular <span class="required">*</span></label>
                    <input type="tel" id="celular" name="celular" required>
                </div>

                <div class="form-group">
                    <label for="tipoId">Tipo de Identificación <span class="required">*</span></label>
                    <select id="tipoId" name="tipoId" required>
                        <option value="">Seleccione una opción</option>
                        <option value="cc">Cédula de Ciudadanía</option>
                        <option value="ti">Tarjeta de Identidad</option>
                        <option value="ce">Cédula de Extranjería</option>
                        <option value="pasaporte">Pasaporte</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="numeroId">Número de Identificación <span class="required">*</span></label>
                    <input type="text" id="numeroId" name="numeroId" required>
                </div>

                <div class="form-group">
                    <label for="ciudad">Ciudad de Procedencia <span class="required">*</span></label>
                    <input type="text" id="ciudad" name="ciudad" required>
                </div>

                <div class="form-group">
                    <label for="totalHuespedes">Número Total de Huéspedes <span class="required">*</span></label>
                    <input type="number" id="totalHuespedes" name="totalHuespedes" min="1" max="6" required>
                </div>

                <div class="form-group">
                    <label for="fechaEntrada">Fecha de Entrada <span class="required">*</span></label>
                    <input type="date" id="fechaEntrada" name="fechaEntrada" required>
                </div>

                <div class="form-group">
                    <label for="fechaSalida">Fecha de Salida <span class="required">*</span></label>
                    <input type="date" id="fechaSalida" name="fechaSalida" required>
                </div>

                <div class="form-group">
                    <label for="comentario">Comentario</label>
                    <textarea id="comentario" name="comentario" placeholder="Ingrese cualquier comentario adicional..."></textarea>
                </div>

                <div class="section-header">Datos de los Acompañantes</div>

                <div class="companion-group">
                    <div class="companion-title">Acompañante 1</div>
                    <div class="form-group">
                        <label for="acomp1Nombre">Nombre(s)</label>
                        <input type="text" id="acomp1Nombre" name="acomp1Nombre">
                    </div>
                    <div class="form-group">
                        <label for="acomp1Apellido">Apellido(s)</label>
                        <input type="text" id="acomp1Apellido" name="acomp1Apellido">
                    </div>
                    <div class="form-group">
                        <label for="acomp1TipoId">Tipo de Identificación</label>
                        <select id="acomp1TipoId" name="acomp1TipoId">
                            <option value="">Seleccione una opción</option>
                            <option value="cc">Cédula de Ciudadanía</option>
                            <option value="ti">Tarjeta de Identidad</option>
                            <option value="ce">Cédula de Extranjería</option>
                            <option value="pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="acomp1NumId">Número de Identificación</label>
                        <input type="text" id="acomp1NumId" name="acomp1NumId">
                    </div>
                </div>

                <div class="companion-group">
                    <div class="companion-title">Acompañante 2</div>
                    <div class="form-group">
                        <label for="acomp2Nombre">Nombre(s)</label>
                        <input type="text" id="acomp2Nombre" name="acomp2Nombre">
                    </div>
                    <div class="form-group">
                        <label for="acomp2Apellido">Apellido(s)</label>
                        <input type="text" id="acomp2Apellido" name="acomp2Apellido">
                    </div>
                    <div class="form-group">
                        <label for="acomp2TipoId">Tipo de Identificación</label>
                        <select id="acomp2TipoId" name="acomp2TipoId">
                            <option value="">Seleccione una opción</option>
                            <option value="cc">Cédula de Ciudadanía</option>
                            <option value="ti">Tarjeta de Identidad</option>
                            <option value="ce">Cédula de Extranjería</option>
                            <option value="pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="acomp2NumId">Número de Identificación</label>
                        <input type="text" id="acomp2NumId" name="acomp2NumId">
                    </div>
                </div>

                <div class="companion-group">
                    <div class="companion-title">Acompañante 3</div>
                    <div class="form-group">
                        <label for="acomp3Nombre">Nombre(s)</label>
                        <input type="text" id="acomp3Nombre" name="acomp3Nombre">
                    </div>
                    <div class="form-group">
                        <label for="acomp3Apellido">Apellido(s)</label>
                        <input type="text" id="acomp3Apellido" name="acomp3Apellido">
                    </div>
                    <div class="form-group">
                        <label for="acomp3TipoId">Tipo de Identificación</label>
                        <select id="acomp3TipoId" name="acomp3TipoId">
                            <option value="">Seleccione una opción</option>
                            <option value="cc">Cédula de Ciudadanía</option>
                            <option value="ti">Tarjeta de Identidad</option>
                            <option value="ce">Cédula de Extranjería</option>
                            <option value="pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="acomp3NumId">Número de Identificación</label>
                        <input type="text" id="acomp3NumId" name="acomp3NumId">
                    </div>
                </div>

                <div class="companion-group">
                    <div class="companion-title">Acompañante 4</div>
                    <div class="form-group">
                        <label for="acomp4Nombre">Nombre(s)</label>
                        <input type="text" id="acomp4Nombre" name="acomp4Nombre">
                    </div>
                    <div class="form-group">
                        <label for="acomp4Apellido">Apellido(s)</label>
                        <input type="text" id="acomp4Apellido" name="acomp4Apellido">
                    </div>
                    <div class="form-group">
                        <label for="acomp4TipoId">Tipo de Identificación</label>
                        <select id="acomp4TipoId" name="acomp4TipoId">
                            <option value="">Seleccione una opción</option>
                            <option value="cc">Cédula de Ciudadanía</option>
                            <option value="ti">Tarjeta de Identidad</option>
                            <option value="ce">Cédula de Extranjería</option>
                            <option value="pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="acomp4NumId">Número de Identificación</label>
                        <input type="text" id="acomp4NumId" name="acomp4NumId">
                    </div>
                </div>

                <div class="companion-group">
                    <div class="companion-title">Acompañante 5</div>
                    <div class="form-group">
                        <label for="acomp5Nombre">Nombre(s)</label>
                        <input type="text" id="acomp5Nombre" name="acomp5Nombre">
                    </div>
                    <div class="form-group">
                        <label for="acomp5Apellido">Apellido(s)</label>
                        <input type="text" id="acomp5Apellido" name="acomp5Apellido">
                    </div>
                    <div class="form-group">
                        <label for="acomp5TipoId">Tipo de Identificación</label>
                        <select id="acomp5TipoId" name="acomp5TipoId">
                            <option value="">Seleccione una opción</option>
                            <option value="cc">Cédula de Ciudadanía</option>
                            <option value="ti">Tarjeta de Identidad</option>
                            <option value="ce">Cédula de Extranjería</option>
                            <option value="pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="acomp5NumId">Número de Identificación</label>
                        <input type="text" id="acomp5NumId" name="acomp5NumId">
                    </div>
                </div>

                <div class="section-header">Consentimiento</div>

                <div class="checkbox-group">
                    <input type="checkbox" id="consent" name="consent" required>
                    <label for="consent">
                        ¿Aceptas tratamiento de tus datos personales por Cabañas MariaMar? <span class="required">*</span>
                        <br><small style="color: #718096; margin-top: 4px; display: block;">
                            Al marcar esta casilla, autorizas el tratamiento de tus datos personales conforme a nuestra política de privacidad.
                        </small>
                    </label>
                </div>

                <button type="submit" class="submit-btn">Enviar Registro</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyACEyCsx-4lhITc8s06QyZPQiS9t3f7I18",
            authDomain: "cabanas-mariamar.firebaseapp.com",
            projectId: "cabanas-mariamar",
            storageBucket: "cabanas-mariamar.firebasestorage.app",
            messagingSenderId: "578365907890",
            appId: "1:578365907890:web:d1561f04e29ed64e97faab",
            measurementId: "G-R3XMD9DPBP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('registrationForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(form);
            const data = {
                cabana: 'Cabaña MariaMar-1',
                timestamp: serverTimestamp(),
                nombre: formData.get('nombre'),
                apellido: formData.get('apellido'),
                celular: formData.get('celular'),
                tipoId: formData.get('tipoId'),
                numeroId: formData.get('numeroId'),
                ciudad: formData.get('ciudad'),
                totalHuespedes: Number(formData.get('totalHuespedes') || 0),
                fechaEntrada: formData.get('fechaEntrada'),
                fechaSalida: formData.get('fechaSalida'),
                comentario: formData.get('comentario'),
                acomp1Nombre: formData.get('acomp1Nombre'),
                acomp1Apellido: formData.get('acomp1Apellido'),
                acomp1TipoId: formData.get('acomp1TipoId'),
                acomp1NumId: formData.get('acomp1NumId'),
                acomp2Nombre: formData.get('acomp2Nombre'),
                acomp2Apellido: formData.get('acomp2Apellido'),
                acomp2TipoId: formData.get('acomp2TipoId'),
                acomp2NumId: formData.get('acomp2NumId'),
                acomp3Nombre: formData.get('acomp3Nombre'),
                acomp3Apellido: formData.get('acomp3Apellido'),
                acomp3TipoId: formData.get('acomp3TipoId'),
                acomp3NumId: formData.get('acomp3NumId'),
                acomp4Nombre: formData.get('acomp4Nombre'),
                acomp4Apellido: formData.get('acomp4Apellido'),
                acomp4TipoId: formData.get('acomp4TipoId'),
                acomp4NumId: formData.get('acomp4NumId'),
                acomp5Nombre: formData.get('acomp5Nombre'),
                acomp5Apellido: formData.get('acomp5Apellido'),
                acomp5TipoId: formData.get('acomp5TipoId'),
                acomp5NumId: formData.get('acomp5NumId'),
                consent: formData.get('consent') === 'on'
            };
            
            const submitBtn = form.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Enviando...';
            submitBtn.disabled = true;
            
            try {
                await addDoc(collection(db, 'registrations'), data);
                
                successMessage.textContent = '¡Registro enviado exitosamente! Gracias por completar el formulario.';
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                form.reset();
                
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = 'Error al enviar el formulario. Por favor intenta nuevamente.';
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 5000);
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fechaEntrada').setAttribute('min', today);
        
        document.getElementById('fechaEntrada').addEventListener('change', function() {
            const checkIn = this.value;
            document.getElementById('fechaSalida').setAttribute('min', checkIn);
        });
    </script>
</body>
</html>
